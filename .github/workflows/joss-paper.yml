name: Build JOSS paper

on:
  push:
    paths:
      - paper/**
  pull_request:
    paths:
      - paper/**

jobs:
  paper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Build JOSS paper
        uses: openjournals/openjournals@main
        with:
          journal: joss
          paper-path: paper/paper.md
